# nginx/nginx.conf
#
# Two Nginx instances are defined in docker-compose.yml (nginx1 + nginx2).
# Each instance uses this same config file.
# Nginx distributes traffic across api1 and api2 in round-robin.

upstream devpad_api {
    # round-robin is the default (no directive needed)
    # max_fails + fail_timeout: if api1 fails 3 times in 30s,
    # Nginx marks it down and sends all traffic to api2.
    server api1:8000 max_fails=3 fail_timeout=30s;
    server api2:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # Forward client IP to FastAPI so activity logs capture real IPs
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    # Increase timeout for LLM endpoints (Phase 4) which may take longer
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://devpad_api;

        # Disable buffering for streaming responses (future SSE/WebSocket)
        proxy_buffering off;
    }

    # Health check endpoint — hit directly (not load balanced)
    # Lets the super admin check which Nginx instance they hit
    location /nginx-health {
        return 200 '{"status":"ok","nginx":"up"}';
        add_header Content-Type application/json;
    }
}
