name: devpad

# ─────────────────────────────────────────────────────────────────
# DevPad — Full Stack
#
# Services:
#   Infrastructure : postgres, mongodb, redis, elasticsearch
#   Messaging      : kafka1, kafka2, kafka3 (KRaft cluster, no Zookeeper)
#   Application    : api1, api2 (FastAPI), consumer (Kafka consumer)
#   Load Balancing : nginx1, nginx2 (both active, same upstream pool)
#   Dev tooling    : mailpit (catches all emails locally)
#
# Start everything:  docker compose up --build
# Start Phase 1 only: docker compose up postgres mongodb api1 mailpit
# ─────────────────────────────────────────────────────────────────

x-api-common: &api-common
  build: .
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    mongodb:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpad_secret}
      POSTGRES_DB: ${POSTGRES_DB:-devpad_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpad}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo_secret
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false   # dev only — enable in production
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s   # ES is slow to start

  # ── Kafka — 3-broker KRaft cluster (no Zookeeper) ───────────────
  # KRaft = Kafka Raft — each broker also acts as a controller.
  # CLUSTER_ID must be the same across all brokers.

  kafka1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "devpad-kafka-cluster-01"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2   # replicate offsets across 2 brokers
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
    volumes:
      - kafka1_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "devpad-kafka-cluster-01"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
    volumes:
      - kafka2_data:/var/lib/kafka/data
    ports:
      - "9093:9092"

  kafka3:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "devpad-kafka-cluster-01"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
    volumes:
      - kafka3_data:/var/lib/kafka/data
    ports:
      - "9094:9092"

  # ── Kafka Consumer ──────────────────────────────────────────────
  consumer:
    build: .
    command: python -m consumer.consumer
    env_file: .env
    depends_on:
      kafka1:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI Instances ───────────────────────────────────────────
  api1:
    <<: *api-common
    environment:
      INSTANCE_ID: api1
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"

  api2:
    <<: *api-common
    environment:
      INSTANCE_ID: api2
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    depends_on:
      api1:
        condition: service_started   # api1 runs migrations first

  # ── Nginx — 2 instances (both active) ───────────────────────────
  # nginx1 is the primary entry point (port 80)
  # nginx2 is the secondary (port 81) — super admin can compare both
  nginx1:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api1
      - api2
    restart: unless-stopped

  nginx2:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "81:80"
    depends_on:
      - api1
      - api2
    restart: unless-stopped

  # ── Mailpit (dev email catcher) ──────────────────────────────────
  # All outgoing emails are captured here — no real emails sent in dev.
  # Open http://localhost:8025 to read them.
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"    # SMTP (FastAPI sends to this)
      - "8025:8025"    # Web UI (you read emails here)
    restart: unless-stopped


# ── Named volumes (data persists across container restarts) ────────
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  es_data:
  kafka1_data:
  kafka2_data:
  kafka3_data:
